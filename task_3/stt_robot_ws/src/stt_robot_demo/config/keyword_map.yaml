# keyword_map.yaml
# nlp_node 가 로드하는 키워드 → 명령 매핑 테이블
# 키워드 추가/수정 후 재빌드 없이 launch 파라미터로 반영 가능
#
# 기어 번호 선택 (task_id) — 음성 예시:
#   "기어 1번 픽앤플레이스"  →  기어 1번만 실행  (--id 1 에 해당)
#   "두번째 기어 조립"       →  기어 2번만 실행  (--id 2 에 해당)
#   "전체 실행"              →  전체 4개 순서대로 실행
#
# 위글 비활성화 (use_wiggle=false) — 음성 예시:
#   "위글없이 조립"          →  위글 없이 실행  (--no-wiggle 에 해당)
#   "위글 빼고 전체실행"     →  위글 없이 전체 실행
#
# 기어 번호와 위글 키워드는 nlp_node 내부 파서가 처리하므로
# 이 파일에 별도 항목 없이도 동작함

